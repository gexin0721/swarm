<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API密钥配置管理</title>
    <style>
        :root {
            /* 淡绿色小清新主题 */
            --bg-gradient-start: #a8e6cf;
            --bg-gradient-mid: #dcedc8;
            --bg-gradient-end: #c8e6c9;
            --header-color: #2d5016;
            --header-subtitle: #3e6b1f;
            --card-shadow: rgba(139,195,74,0.15);
            --card-shadow-hover: rgba(139,195,74,0.25);
            --card-border: rgba(139,195,74,0.1);
            --divider-color: #e8f5e9;
            --label-color: #4a6741;
            --input-border: #e8f5e9;
            --input-bg: #fafafa;
            --input-focus: #81c784;
            --btn-primary-start: #66bb6a;
            --btn-primary-end: #43a047;
            --btn-primary-hover-start: #7bc67e;
            --btn-primary-hover-end: #4caf50;
            --btn-primary-shadow: rgba(102, 187, 106, 0.4);
            --btn-secondary-bg: #e8f5e9;
            --btn-secondary-hover: #c8e6c9;
            --btn-secondary-color: #4a6741;
            --icon1-start: #66bb6a;
            --icon1-end: #43a047;
            --icon2-start: #81c784;
            --icon2-end: #66bb6a;
            --icon3-start: #4db6ac;
            --icon3-end: #26a69a;
            --icon4-start: #9ccc65;
            --icon4-end: #7cb342;
            --status-configured: #66bb6a;
            --status-unconfigured: #ffb74d;
            --footer-color: #3e6b1f;
            --success-bg: #66bb6a;
            --success-shadow: rgba(102, 187, 106, 0.3);
        }

        body.warm-theme {
            /* 米色暖色系主题 */
            --bg-gradient-start: #ffeaa7;
            --bg-gradient-mid: #ffd89b;
            --bg-gradient-end: #fdcb6e;
            --header-color: #6c5ce7;
            --header-subtitle: #a29bfe;
            --card-shadow: rgba(253, 203, 110, 0.2);
            --card-shadow-hover: rgba(253, 203, 110, 0.35);
            --card-border: rgba(253, 203, 110, 0.15);
            --divider-color: #fff5e1;
            --label-color: #6c5b47;
            --input-border: #ffe8cc;
            --input-bg: #fffaf0;
            --input-focus: #fdcb6e;
            --btn-primary-start: #fab1a0;
            --btn-primary-end: #e17055;
            --btn-primary-hover-start: #ffc4b0;
            --btn-primary-hover-end: #ee8468;
            --btn-primary-shadow: rgba(225, 112, 85, 0.4);
            --btn-secondary-bg: #fff5e1;
            --btn-secondary-hover: #ffe8cc;
            --btn-secondary-color: #6c5b47;
            --icon1-start: #fab1a0;
            --icon1-end: #e17055;
            --icon2-start: #ffeaa7;
            --icon2-end: #fdcb6e;
            --icon3-start: #74b9ff;
            --icon3-end: #0984e3;
            --icon4-start: #a29bfe;
            --icon4-end: #6c5ce7;
            --status-configured: #fab1a0;
            --status-unconfigured: #fdcb6e;
            --footer-color: #6c5ce7;
            --success-bg: #55efc4;
            --success-shadow: rgba(85, 239, 196, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: var(--header-color);
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            transition: color 0.3s ease;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.85;
            color: var(--header-subtitle);
            transition: color 0.3s ease;
        }

        .theme-switch {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-switch:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .theme-switch-label {
            font-size: 0.9em;
            color: #555;
            font-weight: 500;
        }

        .theme-toggle {
            position: relative;
            width: 60px;
            height: 30px;
            background: #ddd;
            border-radius: 15px;
            transition: background 0.3s ease;
        }

        .theme-toggle.active {
            background: var(--btn-primary-start);
        }

        .theme-toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .theme-toggle.active .theme-toggle-slider {
            transform: translateX(30px);
        }

        .theme-icon {
            font-size: 1.2em;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: #ffffff;
            border-radius: 15px;
            padding: 25px 30px;
            box-shadow: 0 5px 20px var(--card-shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--card-border);
        }

        .card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 30px var(--card-shadow-hover);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--divider-color);
            transition: border-color 0.3s ease;
        }

        .card-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .deepseek-icon { 
            background: linear-gradient(135deg, var(--icon1-start) 0%, var(--icon1-end) 100%); 
            transition: background 0.3s ease;
        }
        .qwen-icon { 
            background: linear-gradient(135deg, var(--icon2-start) 0%, var(--icon2-end) 100%); 
            transition: background 0.3s ease;
        }
        .kimi-icon { 
            background: linear-gradient(135deg, var(--icon3-start) 0%, var(--icon3-end) 100%); 
            transition: background 0.3s ease;
        }
        .xinhuo-icon { 
            background: linear-gradient(135deg, var(--icon4-start) 0%, var(--icon4-end) 100%); 
            transition: background 0.3s ease;
        }
        .doubao-icon { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); 
            transition: background 0.3s ease;
        }

        .card-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        .card-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--label-color);
            font-weight: 500;
            font-size: 0.9em;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 0.9em;
            transition: border-color 0.3s ease, background-color 0.3s ease;
            background-color: var(--input-bg);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--input-focus);
            background-color: #ffffff;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--btn-primary-start) 0%, var(--btn-primary-end) 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--btn-primary-shadow);
            background: linear-gradient(135deg, var(--btn-primary-hover-start) 0%, var(--btn-primary-hover-end) 100%);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-color);
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--btn-secondary-hover);
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: var(--success-bg);
            box-shadow: 0 5px 15px var(--success-shadow);
            transition: all 0.3s ease;
        }

        .message.error {
            background: #ef5350;
            box-shadow: 0 5px 15px rgba(239, 83, 80, 0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 10px;
        }

        .status-configured {
            background: var(--status-configured);
            box-shadow: 0 0 8px var(--btn-primary-shadow);
            transition: all 0.3s ease;
        }

        .status-unconfigured {
            background: var(--status-unconfigured);
            transition: all 0.3s ease;
        }

        .footer {
            text-align: center;
            color: var(--footer-color);
            margin-top: 30px;
            opacity: 0.75;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .theme-switch {
                position: static;
                margin: 0 auto 20px;
                width: fit-content;
            }

            .cards-container {
                max-width: 100%;
            }

            .card-content {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 20px;
            }

            .card:hover {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="theme-switch" onclick="toggleTheme()">
                <span class="theme-icon" id="theme-icon">🌿</span>
                <div class="theme-toggle" id="theme-toggle">
                    <div class="theme-toggle-slider"></div>
                </div>
                <span class="theme-switch-label" id="theme-label">小清新</span>
            </div>
            <h1>🔐 API密钥配置管理系统</h1>
            <p>统一管理您的AI模型API密钥配置</p>
        </div>

        <div class="cards-container">
            <!-- DeepSeek 配置卡片 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon deepseek-icon">🤖</div>
                    <div>
                        <div class="card-title">
                            DeepSeek
                            <span class="status-indicator" id="deepseek-status"></span>
                        </div>
                    </div>
                </div>
                <form id="deepseek-form">
                    <div class="card-content">
                        <div class="form-group">
                            <label>API Key *</label>
                            <input type="text" name="api_key" placeholder="请输入DeepSeek API Key" required>
                        </div>
                        <div class="form-group">
                            <label>Base URL</label>
                            <input type="text" name="base_url" value="https://api.deepseek.com" placeholder="API基础URL">
                        </div>
                        <div class="form-group">
                            <label>Model</label>
                            <input type="text" name="model" value="deepseek-chat" placeholder="模型名称">
                        </div>
                    </div>
                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary">💾 保存配置</button>
                    </div>
                </form>
            </div>

            <!-- Qwen 配置卡片 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon qwen-icon">🌟</div>
                    <div>
                        <div class="card-title">
                            通义千问 (Qwen)
                            <span class="status-indicator" id="qwen-status"></span>
                        </div>
                    </div>
                </div>
                <form id="qwen-form">
                    <div class="card-content">
                        <div class="form-group">
                            <label>API Key *</label>
                            <input type="text" name="api_key" placeholder="请输入Qwen API Key" required>
                        </div>
                        <div class="form-group">
                            <label>Base URL</label>
                            <input type="text" name="base_url" value="https://dashscope.aliyuncs.com/compatible-mode/v1" placeholder="API基础URL">
                        </div>
                        <div class="form-group">
                            <label>Model</label>
                            <input type="text" name="model" value="qwen-turbo" placeholder="模型名称">
                        </div>
                    </div>
                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary">💾 保存配置</button>
                    </div>
                </form>
            </div>

            <!-- Kimi 配置卡片 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon kimi-icon">🌙</div>
                    <div>
                        <div class="card-title">
                            Kimi
                            <span class="status-indicator" id="kimi-status"></span>
                        </div>
                    </div>
                </div>
                <form id="kimi-form">
                    <div class="card-content">
                        <div class="form-group">
                            <label>API Key *</label>
                            <input type="text" name="api_key" placeholder="请输入Kimi API Key" required>
                        </div>
                        <div class="form-group">
                            <label>Base URL</label>
                            <input type="text" name="base_url" value="https://api.moonshot.cn/v1" placeholder="API基础URL">
                        </div>
                        <div class="form-group">
                            <label>Model</label>
                            <input type="text" name="model" value="moonshot-v1-8k" placeholder="模型名称">
                        </div>
                        <div class="form-group">
                            <label>Tier</label>
                            <input type="text" name="tier" value="Free" placeholder="服务等级">
                        </div>
                    </div>
                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary">💾 保存配置</button>
                    </div>
                </form>
            </div>

            <!-- 豆包 配置卡片 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon doubao-icon">🍰</div>
                    <div>
                        <div class="card-title">
                            豆包 (Doubao)
                            <span class="status-indicator" id="doubao-status"></span>
                        </div>
                    </div>
                </div>
                <form id="doubao-form">
                    <div class="card-content">
                        <div class="form-group">
                            <label>API Key *</label>
                            <input type="text" name="api_key" placeholder="请输入豆包 API Key" required>
                        </div>
                        <div class="form-group">
                            <label>Base URL</label>
                            <input type="text" name="base_url" value="https://ark.cn-beijing.volces.com/api/v3" placeholder="API基础URL">
                        </div>
                        <div class="form-group">
                            <label>Model (Endpoint ID) *</label>
                            <input type="text" name="model" placeholder="ep-xxxxxxxxxxxxxx" required>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary">💾 保存配置</button>
                    </div>

            </div>

            <!-- 讯飞星火 配置卡片 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon xinhuo-icon">⚡</div>
                    <div>
                        <div class="card-title">
                            讯飞星火
                            <span class="status-indicator" id="xinhuo-status"></span>
                        </div>
                    </div>
                </div>
                <form id="xinhuo-form">
                    <div class="card-content">
                        <div class="form-group">
                            <label>APPID *</label>
                            <input type="text" name="appid" placeholder="请输入APPID" required>
                        </div>
                        <div class="form-group">
                            <label>API Secret *</label>
                            <input type="text" name="api_secret" placeholder="请输入API Secret" required>
                        </div>
                        <div class="form-group">
                            <label>API Key *</label>
                            <input type="text" name="api_key" placeholder="请输入API Key" required>
                        </div>
                        <div class="form-group">
                            <label>Domain</label>
                            <input type="text" name="domain" value="4.0Ultra" placeholder="服务域名">
                        </div>
                        <div class="form-group">
                            <label>Spark URL</label>
                            <input type="text" name="Spark_url" value="wss://spark-api.xf-yun.com/v4.0/chat" placeholder="WebSocket地址">
                        </div>
                    </div>
                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary">💾 保存配置</button>
                    </div>
                </form>
            </div>

            <!-- 提示词配置卡片 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📝</div>
                    <div>
                        <div class="card-title">
                            AI提示词 (System Prompt)
                            <span class="status-indicator" id="prompt-status"></span>
                        </div>
                    </div>
                </div>
                <form id="prompt-form">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>System Prompt *</label>
                        <textarea 
                            name="content" 
                            id="prompt-content"
                            rows="20" 
                            placeholder="请输入AI的System Prompt提示词..." 
                            required
                            style="width: 100%; padding: 12px; border: 2px solid var(--input-border); border-radius: 8px; font-size: 0.9em; font-family: 'Consolas', 'Monaco', monospace; resize: vertical; background-color: var(--input-bg); transition: border-color 0.3s ease, background-color 0.3s ease; min-height: 400px;"
                        ></textarea>
                        <small style="color: #666; display: block; margin-top: 5px;">
                            💡 提示：编辑完成后点击"保存配置"，重启AI程序后生效
                        </small>
                    </div>
                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary">💾 保存配置</button>
                        <button type="button" class="btn btn-secondary" onclick="loadPrompt()">🔄 刷新</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="footer">
            <p>DroneSwarm AI 配置管理系统 © 2025</p>
        </div>
    </div>

    <script>
        // 主题切换功能
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const themeLabel = document.getElementById('theme-label');
            
            if (body.classList.contains('warm-theme')) {
                // 切换到小清新主题
                body.classList.remove('warm-theme');
                themeToggle.classList.remove('active');
                themeIcon.textContent = '🌿';
                themeLabel.textContent = '小清新';
                localStorage.setItem('theme', 'fresh');
            } else {
                // 切换到暖色系主题
                body.classList.add('warm-theme');
                themeToggle.classList.add('active');
                themeIcon.textContent = '☀️';
                themeLabel.textContent = '暖色系';
                localStorage.setItem('theme', 'warm');
            }
        }

        // 页面加载时恢复主题
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'fresh';
            const body = document.body;
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const themeLabel = document.getElementById('theme-label');
            
            if (savedTheme === 'warm') {
                body.classList.add('warm-theme');
                themeToggle.classList.add('active');
                themeIcon.textContent = '☀️';
                themeLabel.textContent = '暖色系';
            } else {
                body.classList.remove('warm-theme');
                themeToggle.classList.remove('active');
                themeIcon.textContent = '🌿';
                themeLabel.textContent = '小清新';
            }
        }

        // 显示消息提示
        function showMessage(message, type = 'success') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // 更新状态指示器
        function updateStatus(service, configured) {
            const statusElement = document.getElementById(`${service}-status`);
            if (statusElement) {
                statusElement.className = `status-indicator ${configured ? 'status-configured' : 'status-unconfigured'}`;
            }
        }

        // 加载提示词
        async function loadPrompt() {
            try {
                const response = await fetch('/api/get_prompt');
                const result = await response.json();
                
                if (result.success && result.data) {
                    const textarea = document.getElementById('prompt-content');
                    textarea.value = result.data.content || '';
                    updateStatus('prompt', result.data.content && result.data.content.length > 100);
                    showMessage('提示词加载成功', 'success');
                }
            } catch (error) {
                console.error('加载提示词失败:', error);
                showMessage('加载提示词失败', 'error');
            }
        }

        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch('/api/get_config');
                const result = await response.json();
                
                if (result.success) {
                    const { secret_key, config } = result.data;
                    
                    // 填充 DeepSeek 配置
                    if (secret_key.deepseek) {
                        const form = document.getElementById('deepseek-form');
                        form.api_key.value = secret_key.deepseek.api_key || '';
                        form.base_url.value = secret_key.deepseek.base_url || '';
                        form.model.value = secret_key.deepseek.model || '';
                        updateStatus('deepseek', secret_key.deepseek.api_key && !secret_key.deepseek.api_key.includes('your_'));
                    }
                    
                    // 填充 Qwen 配置
                    if (secret_key.qwen) {
                        const form = document.getElementById('qwen-form');
                        form.api_key.value = secret_key.qwen.api_key || '';
                        form.base_url.value = secret_key.qwen.base_url || '';
                        form.model.value = secret_key.qwen.model || '';
                        updateStatus('qwen', secret_key.qwen.api_key && !secret_key.qwen.api_key.includes('your_'));
                    }
                    
                    // 填充 Kimi 配置
                    if (secret_key.kimi) {
                        const form = document.getElementById('kimi-form');
                        form.api_key.value = secret_key.kimi.api_key || '';
                        form.base_url.value = secret_key.kimi.base_url || '';
                        form.model.value = secret_key.kimi.model || '';
                        form.tier.value = secret_key.kimi.tier || '';
                        updateStatus('kimi', secret_key.kimi.api_key && secret_key.kimi.api_key.startsWith('sk-'));
                    }
                    
                    // 填充豆包配置
                    if (secret_key.doubao) {
                        const form = document.getElementById('doubao-form');
                        form.api_key.value = secret_key.doubao.api_key || '';
                        form.base_url.value = secret_key.doubao.base_url || '';
                        form.model.value = secret_key.doubao.model || '';
                        updateStatus('doubao', secret_key.doubao.api_key && secret_key.doubao.model && secret_key.doubao.model.startsWith('ep-'));
                    }
                    
                    // 填充讯飞星火配置 - 现在也从 secret_key 读取
                    if (secret_key.xinhuo) {
                        const form = document.getElementById('xinhuo-form');
                        form.appid.value = secret_key.xinhuo.appid || '';
                        form.api_secret.value = secret_key.xinhuo.api_secret || '';
                        form.api_key.value = secret_key.xinhuo.api_key || '';
                        form.domain.value = secret_key.xinhuo.domain || '';
                        form.Spark_url.value = secret_key.xinhuo.Spark_url || '';
                        updateStatus('xinhuo', secret_key.xinhuo.appid && secret_key.xinhuo.api_key);
                    }
                }
            } catch (error) {
                console.error('加载配置失败:', error);
                showMessage('加载配置失败', 'error');
            }
        }

        // 处理表单提交
        async function handleSubmit(event, endpoint, service) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    showMessage(result.message, 'success');
                    updateStatus(service, true);
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                console.error('提交失败:', error);
                showMessage('保存配置失败', 'error');
            }
        }

        // 绑定表单事件
        document.getElementById('deepseek-form').addEventListener('submit', (e) => handleSubmit(e, '/api/update_deepseek', 'deepseek'));
        document.getElementById('qwen-form').addEventListener('submit', (e) => handleSubmit(e, '/api/update_qwen', 'qwen'));
        document.getElementById('kimi-form').addEventListener('submit', (e) => handleSubmit(e, '/api/update_kimi', 'kimi'));
        document.getElementById('doubao-form').addEventListener('submit', (e) => handleSubmit(e, '/api/update_doubao', 'doubao'));
        document.getElementById('xinhuo-form').addEventListener('submit', (e) => handleSubmit(e, '/api/update_xinhuo', 'xinhuo'));
        document.getElementById('prompt-form').addEventListener('submit', (e) => handleSubmit(e, '/api/update_prompt', 'prompt'));

        // 页面加载时读取配置和主题
        window.addEventListener('load', () => {
            loadTheme();
            loadConfig();
            loadPrompt();
        });
    </script>
</body>
</html>
